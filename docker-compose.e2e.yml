# =============================================================================
# docker-compose.e2e.yml — PokerTools Docker E2E test stack
#
# Usage (via the E2E test harness or manually):
#   POKERTOOLS_E2E_RUNTIME=/path/to/runtime/dir docker compose -f docker-compose.e2e.yml up --build
#   docker compose -f docker-compose.e2e.yml down -v
#
# The API image is built from the monorepo root Dockerfile.
# The host must be running Anvil on port 8545 before starting this stack.
# =============================================================================

services:
  # ---- Redis (required by the API for caching, pub/sub, job queues) ----
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ---- PokerTools API ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/aaurelions/pokertools:e2e
    pull_policy: build
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: test
      ENABLE_TEST_ROUTES: "true"
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      DATABASE_URL: "file:.runtime/e2e.db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "e2e-jwt-secret-not-for-production"
      COOKIE_SECRET: "e2e-cookie-secret-not-for-production"
      WALLET_ENCRYPTION_SECRET: "e2e-wallet-encryption-secret-for-tests-only"
      WALLET_XPRIV_ENCRYPTION_SECRET: ""
    volumes:
      - ${POKERTOOLS_E2E_RUNTIME:-./pokertools-e2e-runtime}:/app/packages/api/.runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Worker (deposit monitor, game workers) ----
  worker:
    image: ghcr.io/aaurelions/pokertools:e2e
    pull_policy: never
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: test
      ENABLE_TEST_ROUTES: "true"
      DATABASE_URL: "file:.runtime/e2e.db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "e2e-jwt-secret-not-for-production"
      COOKIE_SECRET: "e2e-cookie-secret-not-for-production"
      WALLET_ENCRYPTION_SECRET: "e2e-wallet-encryption-secret-for-tests-only"
      WALLET_XPRIV_ENCRYPTION_SECRET: ""
      LOG_LEVEL: info
    volumes:
      - ${POKERTOOLS_E2E_RUNTIME:-./pokertools-e2e-runtime}:/app/packages/api/.runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    entrypoint: ["/bin/bash", "-lc"]
    command: ["node dist/workers.js"]
    working_dir: /app/packages/api
    logging:
      options:
        max-size: "10m"
        max-file: "3"

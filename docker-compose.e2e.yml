# =============================================================================
# docker-compose.e2e.yml — PokerTools Docker E2E test stack
#
# Usage (via the E2E test harness or manually):
#   POKERTOOLS_E2E_RUNTIME=/path/to/runtime/dir docker compose -f docker-compose.e2e.yml up --build
#   docker compose -f docker-compose.e2e.yml down -v
#
# The API image is built from the monorepo root Dockerfile.
# The host must be running Anvil on port 8545 before starting this stack.
# =============================================================================

services:
  # ---- Redis (required by the API for caching, pub/sub, job queues) ----
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ---- PokerTools API ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/aaurelions/pokertools:e2e
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      DATABASE_URL: "file:.runtime/e2e.db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "e2e-jwt-secret-not-for-production"
      COOKIE_SECRET: "e2e-cookie-secret-not-for-production"
      WALLET_ENCRYPTION_SECRET: "e2e-wallet-encryption-secret-for-tests-only"
    volumes:
      - ${POKERTOOLS_E2E_RUNTIME:-./pokertools-e2e-runtime}:/app/packages/api/.runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Worker (deposit monitor, game workers) ----
  worker:
    image: ghcr.io/aaurelions/pokertools:e2e
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:.runtime/e2e.db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "e2e-jwt-secret-not-for-production"
      COOKIE_SECRET: "e2e-cookie-secret-not-for-production"
      WALLET_ENCRYPTION_SECRET: "e2e-wallet-encryption-secret-for-tests-only"
      LOG_LEVEL: info
    volumes:
      - ${POKERTOOLS_E2E_RUNTIME:-./pokertools-e2e-runtime}:/app/packages/api/.runtime
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/bash", "-lc"]
    command: ["node dist/workers.js"]
    working_dir: /app/packages/api
    logging:
      options:
        max-size: "10m"
        max-file: "3"
